<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="GIVAH">
<title>GIVAH — Nueva sesión</title>
<style>
  :root{--bg:#0f1115;--card:#181b22;--line:#2a2f3a;--text:#e8eaf0;--muted:#8b93a3;--accent:#d4a849;--accent2:#7aa2f7;--danger:#e06c75;--radius:14px}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:16px;line-height:1.4;min-height:100vh}
  .wrap{max-width:560px;margin:0 auto;padding:20px 16px 120px}
  header{padding:8px 0 18px;border-bottom:1px solid var(--line);margin-bottom:18px}
  h1{margin:0;font-size:22px;font-weight:600;letter-spacing:.5px}
  h1 span{color:var(--accent)}
  .sub{color:var(--muted);font-size:14px;margin-top:6px}
  section{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;border:1px solid var(--line)}
  section h2{margin:0 0 10px;font-size:14px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1.2px}
  label{display:block;margin-bottom:14px}
  label .lbl{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  label .lbl .req{color:var(--danger);margin-left:3px}
  input[type=text],textarea{width:100%;background:#0c0e13;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:16px;font-family:inherit;outline:none;transition:border-color .15s ease}
  input:focus,textarea:focus{border-color:var(--accent2)}
  textarea{resize:vertical;min-height:80px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .checkrow{display:flex;align-items:center;gap:10px;margin-top:4px;cursor:pointer;padding:8px 0}
  .checkrow input{width:22px;height:22px;accent-color:var(--accent)}
  .checkrow span{font-size:14px;color:var(--text)}
  .participant{background:#0c0e13;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px}
  .participant .ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .participant .pn{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .rmbtn{background:transparent;border:1px solid var(--line);color:var(--danger);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer}
  .addbtn{width:100%;background:transparent;border:1.5px dashed var(--line);color:var(--accent2);padding:12px;border-radius:10px;font-size:14px;cursor:pointer;margin-top:4px;font-family:inherit}
  .addbtn:hover{border-color:var(--accent2);background:rgba(122,162,247,.08)}
  .footer{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(15,17,21,0) 0%,rgba(15,17,21,.97) 30%,var(--bg) 100%);padding:20px 16px 24px;display:flex;flex-direction:column;align-items:center;gap:0;padding-bottom:max(24px,env(safe-area-inset-bottom))}
  .submit{background:var(--accent);color:#1a1408;border:none;border-radius:12px;padding:14px 32px;font-size:16px;font-weight:600;cursor:pointer;width:100%;max-width:528px;font-family:inherit;box-shadow:0 8px 28px rgba(212,168,73,.25);transition:transform .1s ease}
  .submit:active{transform:scale(.98)}
  .submit:disabled{opacity:.5;cursor:not-allowed}
  .msg{display:none;margin:20px 0;padding:14px;border-radius:10px;font-size:14px}
  .msg.ok{display:block;background:rgba(67,170,84,.15);border:1px solid #43aa54;color:#7dd189}
  .msg.err{display:block;background:rgba(224,108,117,.15);border:1px solid var(--danger);color:var(--danger)}
  .hint{font-size:12px;color:var(--muted);margin-top:4px}
  .trigger{display:flex;align-items:center;justify-content:space-between;background:#0c0e13;border:1.5px solid var(--line);border-radius:10px;padding:11px 14px;cursor:pointer;transition:border-color .15s;user-select:none;-webkit-user-select:none}
  .trigger.open{border-color:var(--accent2)}
  .trigger-text{font-size:16px;color:var(--muted)}
  .trigger-text.has-value{color:var(--text)}
  .trigger-arrow{font-size:14px;color:var(--muted);transition:transform .2s;flex-shrink:0;margin-left:8px}
  .trigger-arrow.open{transform:rotate(180deg);color:var(--accent2)}
  .emp-panel{background:#0c0e13;border:1px solid var(--line);border-radius:10px;margin-top:4px;overflow:hidden;display:none}
  .emp-panel.open{display:block}
  .emp-item{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid #1e2330;cursor:pointer;transition:background .1s}
  .emp-item:last-of-type{border-bottom:1px solid var(--line)}
  .emp-item:active{background:rgba(122,162,247,.08)}
  .emp-name{font-size:15px}
  .emp-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,border-color .15s}
  .emp-check.on{background:var(--accent);border-color:var(--accent)}
  .emp-check.on::after{content:'✓';font-size:13px;color:#1a1408;font-weight:700}
  .emp-custom{display:flex;gap:6px;padding:10px 14px}
  .emp-custom input{flex:1;background:#181b22;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:14px;color:var(--text);font-family:inherit;outline:none}
  .emp-custom input:focus{border-color:var(--accent2)}
  .emp-add{background:transparent;border:1px solid var(--line);color:var(--accent2);border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;font-family:inherit}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{background:rgba(212,168,73,.15);border:1px solid var(--accent);color:var(--accent);border-radius:20px;padding:4px 12px;font-size:13px;display:flex;align-items:center;gap:6px}
  .tag button{background:none;border:none;color:var(--accent);font-size:16px;line-height:1;cursor:pointer;padding:0;margin:0}
  .sid-row{display:flex;gap:8px;align-items:center}
  .sid-row input{flex:1}
  .sid-reset{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:11px 14px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>GIVAH <span>· nueva sesión</span></h1>
    <div class="sub">Rellena los datos del grupo. Esto cargará la sala automáticamente.</div>
  </header>

  <div id="msg" class="msg"></div>

  <form id="f" autocomplete="off">
    <section>
      <h2>La sesión</h2>

      <label>
        <span class="lbl">Empresa(s) participantes<span class="req">*</span></span>
        <div class="trigger" id="trigger" onclick="togglePanel()">
          <span class="trigger-text" id="trigger-text">Selecciona empresa(s)…</span>
          <span class="trigger-arrow" id="trigger-arrow">▾</span>
        </div>
        <div class="emp-panel" id="emp-panel">
          <div id="emp-catalog"></div>
          <div class="emp-custom">
            <input type="text" id="emp-custom-input" placeholder="Otra empresa…" autocomplete="off" spellcheck="false">
            <button type="button" class="emp-add" onclick="addCustom()">+ añadir</button>
          </div>
        </div>
        <div class="tags" id="tags"></div>
      </label>

      <label>
        <span class="lbl">Contexto de la sesión</span>
        <textarea name="contexto" placeholder="Ej. Habitación 302 del hotel Amare, reforma general"></textarea>
      </label>

      <label>
        <span class="lbl">¿Con qué queréis salir de aquí?</span>
        <textarea name="objetivos" placeholder="Ej. Una dirección visual acordada, una imagen de referencia aprobada"></textarea>
      </label>

      <label>
        <span class="lbl">Restricciones no negociables</span>
        <textarea name="restricciones" placeholder="Presupuesto, normativa, espacio fijo, etc. (déjalo vacío si no hay)"></textarea>
      </label>

      <label>
        <span class="lbl">ID de sesión</span>
        <div class="sid-row">
          <input type="text" id="sid-input" name="session_id_override" spellcheck="false" autocorrect="off" autocapitalize="off">
          <button type="button" class="sid-reset" id="sid-reset">↺ regenerar</button>
        </div>
        <div class="hint">Puedes editarla. Se usa como nombre del archivo de sesión.</div>
      </label>
    </section>

    <section>
      <h2>Participantes</h2>
      <div id="participants"></div>
      <button type="button" class="addbtn" id="add">+ Añadir participante</button>
    </section>
  </form>
</div>

<div class="footer">
  <button type="button" class="submit" id="sub">Empezar sesión</button>
</div>

<template id="ptpl">
  <div class="participant">
    <div class="ph">
      <span class="pn">Participante</span>
      <button type="button" class="rmbtn">eliminar</button>
    </div>
    <label>
      <span class="lbl">Nombre<span class="req">*</span></span>
      <input type="text" data-k="nombre" placeholder="Nombre">
    </label>
    <div class="row">
      <label>
        <span class="lbl">Área o rol en la empresa</span>
        <input type="text" data-k="area" placeholder="Ej. Diseño, Producción">
      </label>
      <label>
        <span class="lbl">Rol en la sesión</span>
        <input type="text" data-k="rol" placeholder="participante">
      </label>
    </div>
    <label>
      <span class="lbl">Preferencias o notas</span>
      <textarea data-k="preferencias" placeholder="Ej. Le gustan los tonos cálidos y la madera natural"></textarea>
    </label>
    <label class="checkrow">
      <input type="checkbox" data-k="autoridad_veto">
      <span>Director de la sesión (autoridad de veto/refoco/cierre)</span>
    </label>
  </div>
</template>

<script>
const $ = (sel, ctx) => (ctx||document).querySelector(sel);
const $$ = (sel, ctx) => Array.from((ctx||document).querySelectorAll(sel));

let empresasCat = [];
let empresasSel = new Set();

async function loadEmpresas() {
  try {
    const r = await fetch('/empresas');
    const data = await r.json();
    if (data.ok) empresasCat = data.empresas || [];
  } catch (e) { empresasCat = []; }
  renderEmpresas();
}

function renderEmpresas() {
  const cat = $('#emp-catalog');
  cat.innerHTML = '';
  empresasCat.forEach(name => {
    const on = empresasSel.has(name);
    const item = document.createElement('div');
    item.className = 'emp-item';
    item.innerHTML = '<span class="emp-name">' + escapeHTML(name) + '</span><span class="emp-check ' + (on?'on':'') + '"></span>';
    item.onclick = () => toggleEmp(name);
    cat.appendChild(item);
  });
  renderTags();
}

function toggleEmp(name) {
  if (empresasSel.has(name)) empresasSel.delete(name);
  else empresasSel.add(name);
  renderEmpresas();
}

function renderTags() {
  const t = $('#tags');
  const arr = Array.from(empresasSel);
  t.innerHTML = arr.map(n => '<span class="tag">' + escapeHTML(n) + '<button type="button" onclick="removeEmp(\'' + escapeAttr(n) + '\')">×</button></span>').join('');
  const tt = $('#trigger-text');
  if (arr.length === 0) {
    tt.textContent = 'Selecciona empresa(s)…';
    tt.classList.remove('has-value');
  } else {
    tt.textContent = arr.join(' · ');
    tt.classList.add('has-value');
  }
  regenSid();
}

function removeEmp(name) {
  empresasSel.delete(name);
  renderEmpresas();
}

function addCustom() {
  const inp = $('#emp-custom-input');
  const v = inp.value.trim();
  if (!v) return;
  const up = v.toUpperCase();
  empresasSel.add(up);
  if (!empresasCat.includes(up)) empresasCat.unshift(up);
  inp.value = '';
  renderEmpresas();
}

function togglePanel() {
  const p = $('#emp-panel');
  const t = $('#trigger');
  const a = $('#trigger-arrow');
  const open = !p.classList.contains('open');
  p.classList.toggle('open', open);
  t.classList.toggle('open', open);
  a.classList.toggle('open', open);
}

let sidManual = false;
function regenSid() {
  if (sidManual) return;
  const today = new Date().toISOString().split('T')[0];
  const emp = Array.from(empresasSel).map(e => e.replace(/[^A-Z0-9]/g,'').toUpperCase()).join('-') || 'SESION';
  $('#sid-input').value = 'GIVAH-' + today + '-' + emp + '-01';
}
$('#sid-input').addEventListener('input', () => { sidManual = true; });
$('#sid-reset').onclick = () => { sidManual = false; regenSid(); };

function addParticipant() {
  const tpl = $('#ptpl').content.cloneNode(true);
  const el = tpl.querySelector('.participant');
  el.querySelector('.rmbtn').onclick = () => el.remove();
  $('#participants').appendChild(el);
}
$('#add').onclick = addParticipant;

$('#sub').onclick = async () => {
  const msg = $('#msg');
  msg.className = 'msg';
  msg.textContent = '';

  const empresa = Array.from(empresasSel).join(', ');
  if (!empresa) { showErr('Selecciona al menos una empresa.'); return; }

  const participantes = $$('.participant').map(el => {
    const row = {};
    $$('input[data-k], textarea[data-k]', el).forEach(f => {
      const k = f.dataset.k;
      row[k] = f.type === 'checkbox' ? f.checked : f.value.trim();
    });
    return row;
  }).filter(p => p.nombre);

  if (participantes.length === 0) { showErr('Añade al menos un participante.'); return; }

  const grupo = {
    empresa,
    contexto: $('textarea[name=contexto]').value.trim(),
    objetivos: $('textarea[name=objetivos]').value.trim(),
    restricciones: $('textarea[name=restricciones]').value.trim(),
    session_id_override: sidManual ? $('#sid-input').value.trim() : '',
  };

  const btn = $('#sub');
  btn.disabled = true;
  btn.textContent = 'Enviando…';
  try {
    const r = await fetch('/submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({grupo, participantes})
    });
    const data = await r.json();
    if (data.ok) {
      showOk('Sesión iniciada: ' + data.session_id);
      btn.textContent = '✓ Sesión activa';
    } else {
      showErr(data.error || 'Error desconocido');
      btn.disabled = false;
      btn.textContent = 'Empezar sesión';
    }
  } catch (e) {
    showErr('Error de conexión: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Empezar sesión';
  }
};

function showOk(msg) { const m = $('#msg'); m.textContent = msg; m.className = 'msg ok'; }
function showErr(msg) { const m = $('#msg'); m.textContent = msg; m.className = 'msg err'; }
function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return String(s).replace(/'/g, '&#39;'); }

addParticipant();
loadEmpresas();
regenSid();
</script>
</body>
</html>
